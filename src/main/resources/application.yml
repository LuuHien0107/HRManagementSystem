spring:
  application:
    name: luuhien-spring-rest-with-ai-final
  datasource:
    url: jdbc:mysql://localhost:3306/hr_management?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    web:
      pageable:
        one-indexed-parameters: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

jwt:
  secret: luuhienjwtsecretkeyHS256luuhienjwtsecretkeyHS256luuhienjwt
  expiration: 86400000
  refresh-expiration: 259200000

app:
  seed-data: true
  upload:
    base-dir: uploads
    max-size-bytes: 5242880
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp
    allowed-folders:
      - avatars
      - logos

springdoc: 
  swagger-ui:
    persist-authorization: true
    enabled: true