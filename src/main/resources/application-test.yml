spring:
  application:
    name: luuhien-spring-rest-with-ai-final
  datasource:
    url: jdbc:h2:mem:hr_management_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    web:
      pageable:
        one-indexed-parameters: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

jwt:
  secret: luuhienjwtsecretkeyHS256luuhienjwtsecretkeyHS256luuhienjwt
  expiration: 86400000

app:
  upload:
    base-dir: target/test-uploads
    max-size-bytes: 5242880
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp
    allowed-folders:
      - avatars
      - logos
